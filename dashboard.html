<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";

// Your web app's Firebase configuration

const app = initializeApp(firebaseConfig);
  };
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

</head>
<body>

<header>
  <h1>CalyxHub Dashboard</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="tools.html">Tools</a>
  <a href="premium.html">Premium</a>
</nav>

<section>
  <h2>Welcome, <span id="userEmail">User</span></h2>
  <p>Status: <span id="userStatus">Loading...</span></p>
  <button onclick="logout()">Logout</button>
</section>

<script>
  // Check if user is logged in
  auth.onAuthStateChanged(user => {
    if(user){
      document.getElementById("userEmail").innerText = user.email;

      // Get premium status from Firestore
      db.collection("users").doc(user.uid).get().then(doc => {
        if(doc.exists){
          const premium = doc.data().premium;
          document.getElementById("userStatus").innerText = premium ? "Premium User" : "Free User";
        } else {
          document.getElementById("userStatus").innerText = "Free User";
        }
      });

    } else {
      // Redirect to login if not logged in
      window.location.href = "login.html";
    }
  });

  // Logout function
  function logout(){
    auth.signOut().then(()=>{
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
