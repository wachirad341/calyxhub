  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // REGISTER USER
  function registerUser(email, password) {
    auth.createUserWithEmailAndPassword(email, password)
      .then(userCredential => {
        alert("Registration successful!");
        db.collection("users").doc(userCredential.user.uid).set({
          email: email,
          premium: false
        });
        window.location.href = "dashboard.html";
      })
      .catch(error => alert(error.message));
  }

  // LOGIN USER
  function loginUser(email, password) {
    auth.signInWithEmailAndPassword(email, password)
      .then(userCredential => {
        window.location.href = "dashboard.html";
      })
      .catch(error => alert(error.message));
  }
</script>

<body>

<header>
  <h1>CalyxHub Login/Register</h1>
</header>

<section>
  <h2>Register</h2>
  <input type="email" id="regEmail" placeholder="Email">
  <input type="password" id="regPass" placeholder="Password">
  <button onclick="registerUser(document.getElementById('regEmail').value, document.getElementById('regPass').value)">Register</button>

  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPass" placeholder="Password">
  <button onclick="loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPass').value)">Login</button>
</section>
