<!DOCTYPE html>
<html>
<head>
<title>File Tools - CalyxHub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header><h1>File Tools</h1></header>

<nav>
<a href="index.html">Home</a>
<a href="filetools.html">File Tools</a>
</nav>

<section>

<!-- IMAGE COMPRESSOR -->
<h2>🖼️ Image Compressor</h2>
<input type="file" id="imageInput">
<br><br>
<canvas id="canvas"></canvas>
<br>
<button onclick="compressImage()">Compress</button>

<!-- PDF TOOL -->
<h2>📄 PDF Viewer</h2>
<input type="file" id="pdfInput" accept="application/pdf">
<iframe id="pdfViewer" width="100%" height="400px"></iframe>

</section>

<script>
function compressImage(){
let file=document.getElementById("imageInput").files[0];
let reader=new FileReader();

reader.onload=function(e){
let img=new Image();
img.onload=function(){
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width/2;
canvas.height=img.height/2;

ctx.drawImage(img,0,0,canvas.width,canvas.height);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

document.getElementById("pdfInput").addEventListener("change", function(){
let file=this.files[0];
let url=URL.createObjectURL(file);
document.getElementById("pdfViewer").src=url;
});
</script>

</body>
</html>
